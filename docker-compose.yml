version: '3.8'

services:
  # ==================== MC-LARENS ERP2 (MUNDO ACCESORIOS) ====================
  mongodb:
    image: mongo:7.0
    container_name: mclarens2-mongodb
    restart: unless-stopped
    networks:
      - mundo-network
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: mc-larens2_mundo_accesorios_erp

  backend:
    image: mc-larenserp20-backend:updated-20260219
    container_name: mundo-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_started
    networks:
      - mundo-network
    ports:
      - "8001:8001"
    environment:
      PYTHONPATH: /app
      COOKIE_SECURE: "false"
      ENABLE_TEST_PIN_SEEDING: "false"
      CORS_ORIGINS: "http://127.0.0.1:3000,http://localhost:3000,http://127.0.0.1:3001,http://localhost:3001,http://127.0.0.1:8001,http://localhost:8001"
      DEFAULT_PIN_USER_EMAIL: "xinon@local"
      ALLOW_RRHH_PIN_MANAGEMENT: "false"
      AUTH_SESSION_DATA_URL: ""
      DEFAULT_PIN_USER_PIN: "0101"
      DEFAULT_LOGIN_PIN_USER_PIN: "01011990"
      MONGO_URL: "mongodb://mongodb:27017"
      DB_NAME: "mc-larens2_mundo_accesorios_erp"
      ENABLE_TEST_ENDPOINTS: "true"
      AUTOLOAD_CORE_SEED: "true"
    command: uvicorn backend.server:app --host 0.0.0.0 --port 8001

  frontend:
    image: mundo-frontend:updated-20260219
    container_name: mundo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - mundo-network
    ports:
      - "3000:80"
    environment:
      VITE_BACKEND_URL: ""
      VITE_AUTH_URL: "/api/auth/login"
      VITE_ATTENDANCE_KIOSK_SHORTCUT_PIN: "50005000"
      REACT_APP_BACKEND_URL: ""
      REACT_APP_AUTH_URL: "/api/auth/login"
      REACT_APP_ATTENDANCE_KIOSK_SHORTCUT_PIN: "50005000"
    command: nginx -g "daemon off;"

  # ==================== WHATSAPP CRM ====================
  mc-larens-crm:
    image: whatsapp-crm-mc-larens-crm
    container_name: mc-larens-crm
    restart: unless-stopped
    networks:
      - crm-network
    ports:
      - "3001:3001"
    volumes:
      - whatsapp_data:/app/data
      - whatsapp_logs:/app/logs
      - whatsapp_sessions:/app/sessions
      - whatsapp_backups:/app/backups
      - whatsapp_uploads:/app/uploads
    environment:
      NODE_ENV: "production"
      APP_NAME: "Mc-LarenS CRM"
      APP_PORT: "3001"
      APP_HOST: "0.0.0.0"
      DEFAULT_ADMIN_USER: "admin"
      DEFAULT_ADMIN_PASSWORD: "admin123"
      AUTH_SECRET: "change-this-local-secret"
      PUBLIC_APP_URL: ""
      
      # Paths
      DATA_DIR: "/app/data"
      LOG_DIR: "/app/logs"
      UPLOAD_DIR: "/app/uploads"
      BACKUP_DIR: "/app/backups"
      SQLITE_PATH: "/app/data/crm.sqlite"
      WHATSAPP_SESSION_DIR: "/app/sessions"
      
      # WhatsApp Config
      WHATSAPP_RECONNECT_ENABLED: "true"
      WHATSAPP_RECONNECT_MAX_ATTEMPTS: "0"
      WHATSAPP_RECONNECT_DELAY_MS: "5000"
      
      # AI Config
      AI_ENABLED: "true"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "llama3.1:8b"
      AI_ANALYSIS_CRON: "*/15 * * * *"
      
      # Cron Config
      CRON_ENABLED: "true"
      CRON_TIMEZONE: "America/Managua"
      BACKUP_CRON: "0 2 * * *"
      
      # Logging & Upload
      LOG_LEVEL: "info"
      MAX_UPLOAD_MB: "25"
      TZ: "America/Managua"
    command: node src/index.js
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.APP_PORT || 3001) + '/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  mundo-network:
    driver: bridge
  crm-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  whatsapp_data:
    driver: local
  whatsapp_logs:
    driver: local
  whatsapp_sessions:
    driver: local
  whatsapp_backups:
    driver: local
  whatsapp_uploads:
    driver: local
