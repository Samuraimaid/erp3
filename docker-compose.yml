version: '3.8'

services:
  # ==================== MC-LARENS ERP2 (MUNDO ACCESORIOS) ====================
  mongodb:
    image: mongo:7.0
    container_name: mclarens2-mongodb
    restart: unless-stopped
    networks:
      - mundo-network
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: mc-larens2_mundo_accesorios_erp

  backend:
    image: mc-larenserp20-backend:updated-20260219
    container_name: mundo-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_started
    networks:
      - mundo-network
    ports:
      - "8001:8001"
    environment:
      PYTHONPATH: /app
      COOKIE_SECURE: "false"
      ENABLE_TEST_PIN_SEEDING: "false"
      CORS_ORIGINS: "http://127.0.0.1:3000,http://localhost:3000,http://127.0.0.1:3001,http://localhost:3001,http://127.0.0.1:8001,http://localhost:8001"
      DEFAULT_PIN_USER_EMAIL: "xinon@local"
      ALLOW_RRHH_PIN_MANAGEMENT: "false"
      AUTH_SESSION_DATA_URL: ""
      DEFAULT_PIN_USER_PIN: "0101"
      DEFAULT_LOGIN_PIN_USER_PIN: "01011990"
      MONGO_URL: "mongodb://mongodb:27017"
      DB_NAME: "mc-larens2_mundo_accesorios_erp"
      ENABLE_TEST_ENDPOINTS: "true"
      AUTOLOAD_CORE_SEED: "true"
    command: uvicorn backend.server:app --host 0.0.0.0 --port 8001

  frontend:
    image: mundo-frontend:updated-20260219
    container_name: mundo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - mundo-network
    ports:
      - "3000:80"
    environment:
      VITE_BACKEND_URL: ""
      VITE_AUTH_URL: "/api/auth/login"
      VITE_ATTENDANCE_KIOSK_SHORTCUT_PIN: "50005000"
      REACT_APP_BACKEND_URL: ""
      REACT_APP_AUTH_URL: "/api/auth/login"
      REACT_APP_ATTENDANCE_KIOSK_SHORTCUT_PIN: "50005000"
    command: nginx -g "daemon off;"

networks:
  mundo-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
