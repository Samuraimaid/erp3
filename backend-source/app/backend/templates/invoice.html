<html>
<body style="font-family: Arial, sans-serif;">
    <h2>Factura {invoice_number}</h2>
    <p>Estimado/a {customer_name},</p>
    <p>Adjunto encontrará su factura por la compra realizada.</p>
    <table style="border-collapse: collapse; width: 100%; margin: 20px 0;">
        <tr style="background-color: #f2f2f2;">
            <th style="padding: 10px; border: 1px solid #ddd;">Total</th>
            <td style="padding: 10px; border: 1px solid #ddd;"><strong>${total}</strong></td>
        </tr>
        <tr>
            <th style="padding: 10px; border: 1px solid #ddd;">Fecha</th>
            <td style="padding: 10px; border: 1px solid #ddd;">{created_at}</td>
        </tr>
        <tr>
            <th style="padding: 10px; border: 1px solid #ddd;">Estado de Pago</th>
            <td style="padding: 10px; border: 1px solid #ddd;">{payment_status}</td>
        </tr>
    </table>
    <p>Gracias por su compra.</p>
    <p><em>MUNDO DE ACCESORIOS</em></p>
</body>
</html>
